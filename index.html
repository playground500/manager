<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>플레이그라운드 발주 매니저</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
       background: #f5f5f7; color: #1d1d1f; min-height: 100vh; padding-top: 96px; }

/* ── 앱 헤더 ── */
.app-header { background: #fff; padding: 12px 16px 10px; position: fixed; top: 0; left: 0; right: 0; z-index: 150;
              box-shadow: 0 1px 0 rgba(0,0,0,.08); }
.app-title { font-size: 17px; font-weight: 700; color: #1d1d1f; }
.app-sub { font-size: 11px; color: #86868b; margin-top: 1px; }

/* ── 상단 탭바 ── */
.tab-bar { position: fixed; top: 48px; left: 0; right: 0; background: #fff;
            border-bottom: 2px solid rgba(0,0,0,.08); display: flex; z-index: 200; }
.tab-bar-btn { flex: 1; padding: 10px 0 10px; border: none; background: none; cursor: pointer;
                font-size: 13px; font-weight: 600; color: #86868b; display: flex; flex-direction: row;
                align-items: center; justify-content: center; gap: 6px; transition: color .2s; }
.tab-bar-btn .icon { font-size: 18px; }
.tab-bar-btn.active { color: #007aff; border-bottom: 2px solid #007aff; }

/* ── 뷰 컨테이너 ── */
.view { display: none; }
.view.active { display: block; }

/* ══════════ 매출 트래커 ══════════ */
.sales-section { padding: 12px 16px; }

/* 전체 누적 카드 */
.total-card { background: linear-gradient(135deg, #1d1d1f 0%, #3a3a3c 100%);
               border-radius: 18px; padding: 18px 20px; color: #fff; margin-bottom: 12px; }
.total-label { font-size: 12px; opacity: .7; margin-bottom: 6px; }
.total-amount { font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
.total-sub { font-size: 11px; opacity: .6; margin-top: 4px; }

/* 1호점 / 2호점 카드 */
.store-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.store-card { background: #fff; border-radius: 16px; padding: 14px;
               box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.store-card.s1 { border-top: 3px solid #34c759; }
.store-card.s2 { border-top: 3px solid #007aff; }
.store-name { font-size: 12px; font-weight: 700; color: #636366; margin-bottom: 10px; }
.store-stat { margin-bottom: 8px; }
.store-stat .lbl { font-size: 10px; color: #aeaeb2; margin-bottom: 2px; }
.store-stat .val { font-size: 15px; font-weight: 700; color: #1d1d1f; }
.store-stat .val.highlight { color: #ff3b30; }

/* 달력 섹션 */
.cal-section { background: #fff; border-radius: 18px; margin: 0 16px 12px;
                box-shadow: 0 1px 4px rgba(0,0,0,.07); overflow: hidden; }
.cal-header { display: flex; align-items: center; justify-content: space-between;
               padding: 14px 16px 10px; }
.cal-month { font-size: 16px; font-weight: 700; }
.cal-nav { display: flex; gap: 8px; align-items: center; }
.cal-nav-btn { width: 32px; height: 32px; border: none; background: #f2f2f7; border-radius: 50%;
                font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cal-store-filter { display: flex; gap: 6px; padding: 0 16px 10px; }
.csf-btn { flex: 1; padding: 6px 0; border-radius: 20px; font-size: 12px; font-weight: 600;
             border: 1.5px solid #e0e0e0; background: #fff; color: #636366; cursor: pointer; }
.csf-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 8px; }
.cal-weekday { text-align: center; font-size: 11px; font-weight: 600; color: #aeaeb2;
                padding: 4px 0; }
.cal-weekday:first-child { color: #ff3b30; }
.cal-weekday:last-child { color: #007aff; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 8px 12px; gap: 2px; }
.cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
              justify-content: center; border-radius: 10px; padding: 2px; cursor: default; }
.cal-cell.empty { background: transparent; }
.cal-cell.today { background: #fff3e0 !important; }
.cal-day { font-size: 11px; font-weight: 600; color: #1d1d1f; line-height: 1; }
.cal-cell.sun .cal-day { color: #ff3b30; }
.cal-cell.sat .cal-day { color: #007aff; }
.cal-sales { font-size: 9px; color: #636366; line-height: 1.2; margin-top: 2px; text-align: center; font-weight: 500; }
.cal-cell.has-sales { background: #f0f9ff; }
.cal-cell.has-sales.high { background: #dbeafe; }
.cal-cell.has-sales.very-high { background: #bfdbfe; }
.cal-cell.no-data { opacity: .35; }
.cal-total-row { padding: 10px 16px 14px; border-top: 1px solid #f2f2f7; display: flex; justify-content: space-between; align-items: center; }
.cal-total-label { font-size: 12px; color: #636366; font-weight: 500; }
.cal-total-val { font-size: 15px; font-weight: 700; color: #1d1d1f; }

/* ══════════ 재발주 트래커 ══════════ */
.ro-header { background: #fff; padding: 12px 16px 0; position: sticky; top: 56px; z-index: 90;
              box-shadow: 0 1px 0 rgba(0,0,0,.06); }
.search-box { width: 100%; padding: 9px 14px; border-radius: 10px; border: none;
               background: #f2f2f7; font-size: 15px; color: #1d1d1f; outline: none; margin-bottom: 10px; }
.tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
        border: none; background: #f2f2f7; color: #636366; cursor: pointer; transition: all .2s; }
.tab.active { background: #1d1d1f; color: #fff; }
.filter-row { display: flex; gap: 6px; padding: 0 16px 8px; overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 12px;
               border: 1.5px solid #e0e0e0; background: #fff; color: #636366; cursor: pointer; }
.filter-btn.active { border-color: #1d1d1f; color: #1d1d1f; font-weight: 600; }
.summary { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
.summary::-webkit-scrollbar { display: none; }
.sum-card { flex-shrink: 0; background: #fff; border-radius: 14px; padding: 12px 16px;
             min-width: 100px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.sum-card .num { font-size: 24px; font-weight: 700; }
.sum-card .lbl { font-size: 11px; color: #86868b; margin-top: 2px; }
.sum-card.urgent .num { color: #ff3b30; }
.sum-card.pending .num { color: #007aff; }
.sum-card.done .num { color: #34c759; }
.list { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 8px; }
.item-card { background: #fff; border-radius: 14px; padding: 14px; cursor: pointer;
              box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: transform .1s, opacity .2s;
              border-left: 4px solid transparent; }
.item-card:active { transform: scale(.98); }
.item-card.status-0 { border-left-color: #ff3b30; }
.item-card.status-1 { border-left-color: #007aff; }
.item-card.status-2 { border-left-color: #34c759; opacity: .7; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.item-name { font-size: 14px; font-weight: 600; line-height: 1.35; flex: 1; }
.status-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 12px;
               font-weight: 600; border: none; cursor: pointer; transition: all .2s; white-space: nowrap; }
.status-btn.s0 { background: #fff0ef; color: #ff3b30; }
.status-btn.s1 { background: #e8f0fe; color: #007aff; }
.status-btn.s2 { background: #e8f7ee; color: #34c759; }
.card-meta { display: flex; gap: 8px; align-items: center; margin-top: 7px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 8px; background: #f2f2f7; color: #636366; font-weight: 500; }
.tag.price { background: #fff8e7; color: #b5830a; }
.tag.days-urgent { background: #fff0ef; color: #ff3b30; }
.tag.days-warn { background: #fff8e7; color: #b5830a; }
.tag.days-ok { background: #f2f2f7; color: #86868b; }
.order-info { margin-top: 8px; padding: 8px 10px; background: #f5f5f7; border-radius: 8px;
               font-size: 12px; color: #636366; display: none; }
.order-info.visible { display: block; }
.empty { text-align: center; padding: 60px 20px; color: #86868b; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* ── 모달 ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 300; align-items: flex-end; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 22px 22px 0 0; padding: 20px 20px 40px; width: 100%; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-item-name { font-size: 14px; color: #636366; margin-bottom: 16px; line-height: 1.4; }
.modal-options { display: flex; flex-direction: column; gap: 10px; }
.modal-opt { padding: 14px 16px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; text-align: left; }
.modal-opt.s0 { background: #fff0ef; color: #ff3b30; }
.modal-opt.s1 { background: #e8f0fe; color: #007aff; }
.modal-opt.s2 { background: #e8f7ee; color: #34c759; }
.modal-cancel { margin-top: 8px; width: 100%; padding: 14px; border-radius: 12px; border: none; background: #f2f2f7; font-size: 15px; font-weight: 600; cursor: pointer; }
.note-label { font-size: 13px; font-weight: 600; color: #636366; margin: 14px 0 6px; }
.note-field { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #e0e0e0; font-size: 14px; font-family: inherit; outline: none; resize: none; }
.note-field:focus { border-color: #1d1d1f; }
.modal-save { margin-top: 10px; width: 100%; padding: 14px; border-radius: 12px; border: none; background: #1d1d1f; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }

/* 비밀번호 화면 */
.pw-screen { position: fixed; inset: 0; background: #f5f5f7; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.pw-logo { font-size: 48px; margin-bottom: 16px; }
.pw-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.pw-sub { font-size: 14px; color: #86868b; margin-bottom: 32px; }
.pw-input { width: 100%; max-width: 320px; padding: 14px 16px; border-radius: 14px; border: 1.5px solid #e0e0e0; font-size: 18px; text-align: center; letter-spacing: 4px; outline: none; background: #fff; }
.pw-input:focus { border-color: #1d1d1f; }
.pw-btn { margin-top: 14px; width: 100%; max-width: 320px; padding: 14px; border-radius: 14px; border: none; background: #1d1d1f; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
.pw-error { margin-top: 10px; font-size: 13px; color: #ff3b30; min-height: 18px; }
</style>
</head>
<body>

<!-- 비밀번호 화면 -->
<div class="pw-screen" id="pwScreen">
  <div class="pw-logo">📦</div>
  <div class="pw-title">플레이그라운드 발주 매니저</div>
  <div class="pw-sub">접근 비밀번호를 입력하세요</div>
  <input class="pw-input" type="password" id="pwInput" placeholder="••••" maxlength="8"
         onkeydown="if(event.key==='Enter') checkPw()">
  <button class="pw-btn" onclick="checkPw()">입장</button>
  <div class="pw-error" id="pwError"></div>
</div>

<!-- 앱 본체 (비밀번호 통과 후 표시) -->
<div id="appBody" style="display:none">

<!-- 앱 헤더 -->
<div class="app-header">
  <div class="app-title">플레이그라운드 발주 매니저</div>
  <div class="app-sub" id="appDate"></div>
</div>

<!-- 상단 탭바 -->
<div class="tab-bar">
  <button class="tab-bar-btn active" id="tbSales" onclick="switchView('sales')">
    <span class="icon">📊</span><span>매출</span>
  </button>
  <button class="tab-bar-btn" id="tbReorder" onclick="switchView('reorder')">
    <span class="icon">📦</span><span>재발주</span>
  </button>
</div>

<!-- ── 매출 트래커 뷰 ── -->
<div class="view active" id="view-sales">
  <div class="sales-section">
    <!-- 전체 누적 -->
    <div class="total-card">
      <div class="total-label">1호점 + 2호점 전체 누적 매출</div>
      <div class="total-amount" id="totalAll">-</div>
      <div class="total-sub" id="totalPeriod"></div>
    </div>
    <!-- 1호점 / 2호점 카드 -->
    <div class="store-cards">
      <div class="store-card s1">
        <div class="store-name">🟢 1호점 (철산)</div>
        <div class="store-stat"><div class="lbl">어제 매출</div><div class="val" id="s1Yesterday">-</div></div>
        <div class="store-stat"><div class="lbl">이번 달 일평균</div><div class="val" id="s1AvgDay">-</div></div>
        <div class="store-stat"><div class="lbl">이번 달 누적</div><div class="val highlight" id="s1MonthTotal">-</div></div>
      </div>
      <div class="store-card s2">
        <div class="store-name">🔵 2호점 (푸르지오)</div>
        <div class="store-stat"><div class="lbl">어제 매출</div><div class="val" id="s2Yesterday">-</div></div>
        <div class="store-stat"><div class="lbl">이번 달 일평균</div><div class="val" id="s2AvgDay">-</div></div>
        <div class="store-stat"><div class="lbl">이번 달 누적</div><div class="val highlight" id="s2MonthTotal">-</div></div>
      </div>
    </div>
  </div>

  <!-- 달력 -->
  <div class="cal-section">
    <div class="cal-header">
      <div class="cal-month" id="calMonth"></div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-store-filter">
      <button class="csf-btn active" onclick="setCalStore('both',this)">합산</button>
      <button class="csf-btn" onclick="setCalStore('s1',this)">1호점</button>
      <button class="csf-btn" onclick="setCalStore('s2',this)">2호점</button>
    </div>
    <div class="cal-weekdays">
      <div class="cal-weekday">일</div><div class="cal-weekday">월</div>
      <div class="cal-weekday">화</div><div class="cal-weekday">수</div>
      <div class="cal-weekday">목</div><div class="cal-weekday">금</div>
      <div class="cal-weekday">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-total-row">
      <div class="cal-total-label" id="calTotalLabel">이번 달 합계</div>
      <div class="cal-total-val" id="calTotal">-</div>
    </div>
  </div>
</div>

<!-- ── 재발주 트래커 뷰 ── -->
<div class="view" id="view-reorder">
  <div class="ro-header">
    <input class="search-box" type="text" id="searchInput" placeholder="🔍 상품명 검색..." oninput="renderList()">
    <div class="tabs">
      <button class="tab active" onclick="setTab('all',this)">전체</button>
      <button class="tab" onclick="setTab('7',this)">최근 7일</button>
      <button class="tab" onclick="setTab('14',this)">최근 14일</button>
      <button class="tab" onclick="setTab('30',this)">최근 30일</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체 상태</button>
      <button class="filter-btn" onclick="setFilter('0',this)">🔴 미확인</button>
      <button class="filter-btn" onclick="setFilter('1',this)">🔵 발주완료</button>
      <button class="filter-btn" onclick="setFilter('2',this)">🟢 입고완료</button>
    </div>
  </div>
  <div class="summary" id="summaryRow"></div>
  <div class="list" id="itemList"></div>
</div>

</div><!-- /appBody -->

<!-- 재발주 모달 -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">상태 변경</div>
    <div class="modal-item-name" id="modalName"></div>
    <div class="modal-options">
      <button class="modal-opt s0" onclick="setStatus(0)">🔴 미확인 — 아직 발주 전</button>
      <button class="modal-opt s1" onclick="setStatus(1)">🔵 발주완료 — 발주 넣었음</button>
      <button class="modal-opt s2" onclick="setStatus(2)">🟢 입고완료 — 재고 들어옴</button>
    </div>
    <div class="note-label">메모 (발주처, 입고 예정일 등)</div>
    <textarea class="note-field" id="noteField" rows="2" placeholder="예) 5/7 광명도매 방문 시 픽업 예정"></textarea>
    <button class="modal-save" onclick="saveModal()">저장</button>
    <button class="modal-cancel" onclick="closeModal()">취소</button>
  </div>
</div>


<script>
// ══ 비밀번호 ══
const PW_KEY = 'pg_manager_auth';
const CORRECT_PW = '1234'; // ← 여기서 비밀번호 변경

function checkPw() {
  const input = document.getElementById('pwInput').value;
  if (input === CORRECT_PW) {
    sessionStorage.setItem(PW_KEY, '1');
    document.getElementById('pwScreen').style.display = 'none';
    document.getElementById('appBody').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pwError').textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('pwInput').value = '';
  }
}

window.onload = () => {
  if (sessionStorage.getItem(PW_KEY) === '1') {
    document.getElementById('pwScreen').style.display = 'none';
    document.getElementById('appBody').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pwInput').focus();
  }

// ══ 매출 트래커 ══
function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + '백만';
  return n.toLocaleString() + '원';
}
function fmtFull(n) { return n.toLocaleString() + '원'; }

let calYear, calMonth, calStore = 'both';

function initSales() {
  const today = new Date();
  calYear = today.getFullYear(); calMonth = today.getMonth();

  // 어제
  const yest = new Date(today); yest.setDate(today.getDate()-1);
  const yestStr = yest.toISOString().slice(0,10);
  const yestData = dailyMap[yestStr] || {s1:0, s2:0};

  // 이번 달
  const ym = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const thisMonth = DAILY.filter(d => d.d.startsWith(ym));
  const s1Month = thisMonth.reduce((a,d)=>a+d.s1,0);
  const s2Month = thisMonth.reduce((a,d)=>a+d.s2,0);
  const days = thisMonth.length || 1;

  // 전체 누적
  const totalS1 = DAILY.reduce((a,d)=>a+d.s1,0);
  const totalS2 = DAILY.reduce((a,d)=>a+d.s2,0);
  const minDate = DAILY[0]?.d || '';
  const maxDate = DAILY[DAILY.length-1]?.d || '';

  document.getElementById('totalAll').textContent = fmtFull(totalS1+totalS2);
  document.getElementById('totalPeriod').textContent = `${minDate} ~ ${maxDate}`;
  document.getElementById('s1Yesterday').textContent = fmtFull(yestData.s1);
  document.getElementById('s2Yesterday').textContent = fmtFull(yestData.s2);
  document.getElementById('s1AvgDay').textContent = fmtFull(Math.round(s1Month/days));
  document.getElementById('s2AvgDay').textContent = fmtFull(Math.round(s2Month/days));
  document.getElementById('s1MonthTotal').textContent = fmtFull(s1Month);
  document.getElementById('s2MonthTotal').textContent = fmtFull(s2Month);

  const today2 = new Date(); 
  document.getElementById('appDate').textContent = 
    `${today2.getMonth()+1}/${today2.getDate()} 기준`;

  renderCalendar();
}

function setCalStore(store, el) {
  calStore = store;
  document.querySelectorAll('.csf-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCalendar();
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const ymStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  document.getElementById('calMonth').textContent =
    `${calYear}년 ${calMonth+1}월`;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  // 이번 달 최대값 (색 스케일용)
  const monthSales = [];
  for (let d=1; d<=lastDate; d++) {
    const ds = `${ymStr}-${String(d).padStart(2,'0')}`;
    const row = dailyMap[ds];
    let v = 0;
    if (row) v = calStore==='s1' ? row.s1 : calStore==='s2' ? row.s2 : row.s1+row.s2;
    monthSales.push(v);
  }
  const maxSale = Math.max(...monthSales, 1);
  let monthTotal = monthSales.reduce((a,b)=>a+b,0);

  const grid = document.getElementById('calGrid');
  let html = '';

  // 빈 셀
  for (let i=0; i<firstDay; i++) html += '<div class="cal-cell empty"></div>';

  for (let d=1; d<=lastDate; d++) {
    const ds = `${ymStr}-${String(d).padStart(2,'0')}`;
    const row = dailyMap[ds];
    const dayDate = new Date(calYear, calMonth, d);
    const dow = dayDate.getDay();
    const isToday = dayDate.getTime() === today.getTime();
    const isFuture = dayDate > today;

    let v = 0, hasSales = false;
    if (row) {
      v = calStore==='s1' ? row.s1 : calStore==='s2' ? row.s2 : row.s1+row.s2;
      hasSales = v > 0;
    }

    const ratio = maxSale > 0 ? v / maxSale : 0;
    let bgClass = isFuture ? 'no-data' : (hasSales ? (ratio>0.7?'has-sales very-high':ratio>0.4?'has-sales high':'has-sales') : '');
    const dowClass = dow===0?'sun':dow===6?'sat':'';
    const todayClass = isToday ? 'today' : '';

    const salesLabel = hasSales ? fmt(v) : (isFuture ? '' : '');

    html += `<div class="cal-cell ${bgClass} ${dowClass} ${todayClass}">
      <span class="cal-day">${d}</span>
      ${hasSales ? `<span class="cal-sales">${salesLabel}</span>` : ''}
    </div>`;
  }

  grid.innerHTML = html;

  const storeLabel = calStore==='s1'?'1호점':calStore==='s2'?'2호점':'합산';
  document.getElementById('calTotalLabel').textContent = `${calMonth+1}월 ${storeLabel} 합계`;
  document.getElementById('calTotal').textContent = fmtFull(monthTotal);
}

  try { roState = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch(e) { roState={}; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(roState)); }
function getItemState(id) { return roState[id] || {status:0, note:'', updatedAt:''}; }

function daysSince(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((today - new Date(dateStr)) / 86400000);
}

    if (daysSince(item.lastSale) > tabDays) return false;
    const st = getItemState(item.id).status;
    if (currentFilter!=='all' && st!==parseInt(currentFilter)) return false;
    if (query && !item.name.toLowerCase().includes(query) && !item.cat.toLowerCase().includes(query)) return false;
    return true;
  });
  const all14 = ITEMS.filter(i => daysSince(i.lastSale)<=14);
  const uc = all14.filter(i=>getItemState(i.id).status===0).length;
  const pc = all14.filter(i=>getItemState(i.id).status===1).length;
  const dc = all14.filter(i=>getItemState(i.id).status===2).length;
  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-card urgent"><div class="num">${uc}</div><div class="lbl">미확인(14일)</div></div>
    <div class="sum-card pending"><div class="num">${pc}</div><div class="lbl">발주완료</div></div>
    <div class="sum-card done"><div class="num">${dc}</div><div class="lbl">입고완료</div></div>
    <div class="sum-card"><div class="num">${ITEMS.length}</div><div class="lbl">전체 상품</div></div>`;
  const list = document.getElementById('itemList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>해당 상품이 없어요</div></div>';
    return;
  }
  list.innerHTML = filtered.map((item, idx) => {
    const days = daysSince(item.lastSale);
    const st = getItemState(item.id);
    const dc2 = days<=3?'days-urgent':days<=7?'days-warn':'days-ok';
    const dl = days===0?'오늘':`${days}일 전`;
    const globalIdx = ITEMS.indexOf(item);
    return `<div class="item-card status-${st.status}" onclick="openModalByIdx(${globalIdx})">
      <div class="card-top">
        <div class="item-name">${item.name}</div>
        <button class="status-btn ${STATUS_CLASSES[st.status]}" onclick="event.stopPropagation();quickCycleByIdx(${globalIdx})">${STATUS_LABELS[st.status]}</button>
      </div>
      <div class="card-meta">
        <span class="tag">${item.cat}</span>
        <span class="tag price">${item.price.toLocaleString()}원</span>
        <span class="tag ${dc2}">📅 ${dl} 판매</span>
        ${item.totalSold>1?`<span class="tag">누적 ${item.totalSold}회</span>`:''}
      </div>
      ${st.note?`<div class="order-info visible">📝 ${st.note}</div>`:''}
    </div>`;
  }).join('');
}

function quickCycle(id) {
  const st = getItemState(id);
  roState[id] = {...st, status:(st.status+1)%3, updatedAt:new Date().toISOString()};
  saveState(); renderList();
}
function quickCycleByIdx(idx) { quickCycle(ITEMS[idx].id); }
function openModalByIdx(idx) { openModal(ITEMS[idx].id); }
function openModal(id) {
  activeItemId = id;
  const item = ITEMS.find(i=>i.id===id);
  const st = getItemState(id);
  document.getElementById('modalName').textContent = item.name;
  document.getElementById('noteField').value = st.note||'';
  document.getElementById('modalBg').classList.add('open');
}
function setStatus(s) {
  if (!activeItemId) return;
  roState[activeItemId] = {...getItemState(activeItemId), status:s, updatedAt:new Date().toISOString()};
  saveState();
}
function saveModal() {
  if (!activeItemId) return;
  const note = document.getElementById('noteField').value.trim();
  roState[activeItemId] = {...getItemState(activeItemId), note, updatedAt:new Date().toISOString()};
  saveState(); closeModal(); renderList();
}
function closeModal(e) {
  if (e && e.target!==document.getElementById('modalBg')) return;
  document.getElementById('modalBg').classList.remove('open');
  activeItemId = null;
}

function initApp() {
  loadState();
  initSales();
  renderList();
}
</script>
</body>
